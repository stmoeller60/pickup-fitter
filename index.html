<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Pickup Fitter</title>
</head>
<body>
    <header>
        <h1>Willkommen beim Pickup Fitter</h1>
    </header>
    <main>
        <section id="info">
            <h2>Information</h2>
            <p>Hier finden Sie alles, was Sie über Pickup-Fitting wissen müssen.</p>
        </section>
        <section id="contact">
            <h2>Kontakt</h2>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit">Absenden</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pickup Fitter. Alle Rechte vorbehalten.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
