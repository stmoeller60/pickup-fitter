<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pickup Model Fitter</title>
<style>
body { font-family: Arial; background:#111; color:#eee; }
input,button { margin:5px; }
canvas { width:100%; height:250px; background:#000; }
.panel { border:1px solid #333; padding:10px; margin:10px; }
</style>
</head>
<body>

<h2>Pickup Model Fitter</h2>

<div class="panel">
<b>Dateien (optional)</b><br>
H Betrag <input type="file" id="hmag"><br>
H Phase <input type="file" id="hph"><br>
Z Betrag <input type="file" id="zmag"><br>
Z Phase <input type="file" id="zph"><br>
</div>

<div class="panel">
<b>Optionen</b><br>
<label><input type="checkbox" id="useRL" checked> RL-Zweig</label><br>
<label><input type="checkbox" id="weightH" checked> H gewichten</label><br>
</div>

<div class="panel">
<b>Zusatzlast</b><br>
<label><input type="checkbox" id="loadOn"> aktiv</label><br>
R [Ω] <input id="loadR" value="1000000"><br>
L [H] <input id="loadL" value="0"><br>
C [pF] <input id="loadC" value="0"><br>
</div>

<button onclick="runFit()">FIT START</button>

<div id="status"></div>

<h3>Parameter</h3>
<pre id="params"></pre>

<h3>Plots</h3>
<canvas id="plot1"></canvas>
<canvas id="plot2"></canvas>
<canvas id="plot3"></canvas>
<canvas id="plot4"></canvas>
<canvas id="plot5"></canvas>

<script>

// ---------- FILE PARSER ----------
async function loadFile(inp){
 if(!inp.files[0]) return null;
 let t = await inp.files[0].text();
 let arr=[];
 t.split(/\n/).forEach(l=>{
   let p=l.trim().split(/[\s,;]+/);
   if(p.length>=2) arr.push([+p[0],+p[1]]);
 });
 return arr;
}

// ---------- INTERP ----------
function interp(x, arr){
 if(!arr) return null;
 for(let i=1;i<arr.length;i++){
  if(x<=arr[i][0]){
    let [x0,y0]=arr[i-1], [x1,y1]=arr[i];
    let t=(x-x0)/(x1-x0);
    return y0+t*(y1-y0);
  }
 }
 return arr[arr.length-1][1];
}

// ---------- MODEL ----------
function model(p,f){
 let {Rp,L,C,Rdc,Re,Le}=p;
 let w=2*Math.PI*f;

 let Zs = complex(Rdc, w*L);

 let Y = complex(1/Rp, w*C);

 if(document.getElementById("useRL").checked){
   let Ze = complex(Re, w*Le);
   Y = add(Y, inv(Ze));
 }

 let Zsh = inv(Y);

 let H = div(Zsh, add(Zs,Zsh));
 let Zin = inv(add(inv(Zs),inv(Zsh)));

 return {
  Hmag: 20*Math.log10(abs(H)),
  Hph: angle(H),
  Zmag: abs(Zin),
  Zph: angle(Zin)
 };
}

// ---------- COMPLEX ----------
function complex(r,i){ return {r,i}; }
function add(a,b){ return {r:a.r+b.r, i:a.i+b.i}; }
function inv(z){
 let d=z.r*z.r+z.i*z.i;
 return {r:z.r/d, i:-z.i/d};
}
function div(a,b){
 let d=b.r*b.r+b.i*b.i;
 return {r:(a.r*b.r+a.i*b.i)/d, i:(a.i*b.r-a.r*b.i)/d};
}
function abs(z){ return Math.hypot(z.r,z.i); }
function angle(z){ return Math.atan2(z.i,z.r)*180/Math.PI; }

// ---------- FIT ----------
function error(p,data,freq){
 let e=0,n=0;

 for(let f of freq){
   let m=model(p,f);

   if(data.hmag){
     let w=1;
     if(document.getElementById("weightH").checked){
       let lf=Math.log10(f);
       let c=Math.log10(7000);
       w=1+3*Math.exp(-((lf-c)**2)/(2*0.42*0.42));
     }
     e+=((m.Hmag-interp(f,data.hmag))*w)**2;
     n++;
   }

   if(data.hph){
     e+=((m.Hph-interp(f,data.hph))/5)**2;
     n++;
   }

   if(data.zmag){
     e+=((Math.log(m.Zmag)-Math.log(interp(f,data.zmag)))/0.08)**2;
     n++;
   }

   if(data.zph){
     e+=((m.Zph-interp(f,data.zph))/3)**2;
     n++;
   }
 }

 return e/n;
}

// ---------- RANDOM SEARCH ----------
function rand(a,b){ return a+Math.random()*(b-a); }

function randomParams(){
 return {
  Rp: rand(1e4,2e5),
  L: rand(1,5),
  C: rand(50e-12,200e-12),
  Rdc: rand(3000,6000),
  Re: rand(1e4,1e5),
  Le: rand(0.1,5)
 };
}

// ---------- MAIN ----------
async function runFit(){

 let data={
  hmag: await loadFile(hmag),
  hph: await loadFile(hph),
  zmag: await loadFile(zmag),
  zph: await loadFile(zph)
 };

 let freq=[];
 for(let i=0;i<400;i++){
   freq.push(10**(Math.log10(20)+i/399*(Math.log10(20000)-Math.log10(20))));
 }

 let best=null, bestE=1e99;

 for(let s=0;s<30;s++){
   let p=randomParams();

   for(let i=0;i<80;i++){
     let p2=JSON.parse(JSON.stringify(p));
     let keys=Object.keys(p2);
     let k=keys[Math.floor(Math.random()*keys.length)];
     p2[k]*=rand(0.8,1.2);

     let e=error(p2,data,freq);
     if(e<bestE){
       bestE=e;
       best=p2;
       p=p2;
       document.getElementById("status").innerText="best="+bestE;
     }
   }
 }

 document.getElementById("params").innerText=JSON.stringify(best,null,2);

 plotAll(best,data,freq);
}

// ---------- PLOT ----------
function plot(canvas, x,y1,y2){
 let ctx=canvas.getContext("2d");
 ctx.clearRect(0,0,canvas.width,canvas.height);

 let xmin=Math.min(...x), xmax=Math.max(...x);
 let ymin=Math.min(...y1.concat(y2||y1));
 let ymax=Math.max(...y1.concat(y2||y1));

 function tx(v){ return (Math.log10(v)-Math.log10(xmin))/(Math.log10(xmax)-Math.log10(xmin))*canvas.width; }
 function ty(v){ return canvas.height-(v-ymin)/(ymax-ymin)*canvas.height; }

 ctx.strokeStyle="red";
 ctx.beginPath();
 x.forEach((v,i)=>{
  let xx=tx(v), yy=ty(y1[i]);
  if(i==0) ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy);
 });
 ctx.stroke();

 if(y2){
 ctx.strokeStyle="cyan";
 ctx.beginPath();
 x.forEach((v,i)=>{
  let xx=tx(v), yy=ty(y2[i]);
  if(i==0) ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy);
 });
 ctx.stroke();
 }
}

// ---------- LOAD RESPONSE ----------
function loadResponse(p,freq){
 if(!document.getElementById("loadOn").checked) return null;

 let R=+loadR.value;
 let L=+loadL.value;
 let C=+loadC.value*1e-12;

 let out=[];
 for(let f of freq){
   let w=2*Math.PI*f;
   let ZL=complex(0,w*L);
   let ZC=complex(0,-1/(w*C||1e9));
   let ZR=complex(R,0);

   let Y=add(inv(ZR),add(inv(ZL),inv(ZC)));
   let Z=inv(Y);

   let m=model(p,f);
   out.push(m.Hmag); // simple
 }
 return out;
}

// ---------- MASTER PLOT ----------
function plotAll(p,data,freq){

 let Hm=[],Hp=[],Zm=[],Zp=[],Hm2=[];

 freq.forEach(f=>{
   let m=model(p,f);
   Hm.push(m.Hmag);
   Hp.push(m.Hph);
   Zm.push(m.Zmag);
   Zp.push(m.Zph);
 });

 let load=loadResponse(p,freq);

 plot(plot1,freq,Hm,data.hmag && freq.map(f=>interp(f,data.hmag)));
 plot(plot2,freq,Hp,data.hph && freq.map(f=>interp(f,data.hph)));
 plot(plot3,freq,Zm,data.zmag && freq.map(f=>interp(f,data.zmag)));
 plot(plot4,freq,Zp,data.zph && freq.map(f=>interp(f,data.zph)));
 if(load) plot(plot5,freq,load,null);
}

</script>
</body>
</html>
