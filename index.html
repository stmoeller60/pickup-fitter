<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pickup Model Fitter</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:#eee;
  margin:20px;
}

.panel {
  border:1px solid #333;
  padding:10px;
  margin-bottom:10px;
}

input, button {
  margin:4px;
}

canvas {
  width:100%;
  height:180px;   /* <<< kleiner! */
  background:#000;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
</style>
</head>
<body>

<h2>Pickup Model Fitter</h2>

<div class="panel">
<b>Dateien (optional)</b><br>
H Betrag <input type="file" id="hmag"><br>
H Phase <input type="file" id="hph"><br>
Z Betrag <input type="file" id="zmag"><br>
Z Phase <input type="file" id="zph"><br>
</div>

<div class="panel">
<label><input type="checkbox" id="useRL" checked> RL-Zweig</label><br>
<label><input type="checkbox" id="weightH" checked> H gewichten</label>
</div>

<div class="panel">
<b>Zusatzlast (nur Simulation!)</b><br>
R [Ω] <input id="loadR" value="1000000"><br>
L [H] <input id="loadL" value="0"><br>
C [pF] <input id="loadC" value="0"><br>
</div>

<button onclick="runFit()">FIT</button>
<button onclick="calcLoad()">Frequenzgang mit Last berechnen</button>

<pre id="params"></pre>

<div class="grid">
<canvas id="p1"></canvas>
<canvas id="p2"></canvas>
<canvas id="p3"></canvas>
<canvas id="p4"></canvas>
<canvas id="p5"></canvas>
</div>

<script>

// ---------- BASIC ----------
function complex(r,i){ return {r,i}; }
function add(a,b){ return {r:a.r+b.r,i:a.i+b.i}; }
function inv(z){ let d=z.r*z.r+z.i*z.i; return {r:z.r/d,i:-z.i/d}; }
function div(a,b){
 let d=b.r*b.r+b.i*b.i;
 return {r:(a.r*b.r+a.i*b.i)/d,i:(a.i*b.r-a.r*b.i)/d};
}
function abs(z){ return Math.hypot(z.r,z.i); }
function ang(z){ return Math.atan2(z.i,z.r)*180/Math.PI; }

// ---------- FILE ----------
async function loadFile(inp){
 if(!inp.files[0]) return null;
 let t=await inp.files[0].text();
 let a=[];
 t.split(/\n/).forEach(l=>{
  let p=l.trim().split(/[\s,;]+/);
  if(p.length>=2) a.push([+p[0],+p[1]]);
 });
 return a;
}

// ---------- INTERP ----------
function interp(x,a){
 if(!a) return null;
 for(let i=1;i<a.length;i++){
  if(x<=a[i][0]){
    let [x0,y0]=a[i-1], [x1,y1]=a[i];
    return y0+(y1-y0)*(x-x0)/(x1-x0);
  }
 }
 return a[a.length-1][1];
}

// ---------- MODEL ----------
function model(p,f){
 let w=2*Math.PI*f;

 let Zs = complex(p.Rdc, w*p.L);
 let Y = complex(1/p.Rp, w*p.C);

 if(document.getElementById("useRL").checked){
  let Ze = complex(p.Re, w*p.Le);
  Y = add(Y, inv(Ze));
 }

 let Zsh = inv(Y);

 let H = div(Zsh, add(Zs,Zsh));
 let Zin = inv(add(inv(Zs),inv(Zsh)));

 return {
  Hm:20*Math.log10(abs(H)),
  Hp:ang(H),
  Zm:abs(Zin),
  Zp:ang(Zin)
 };
}

// ---------- FIT ----------
let bestParams=null;
let freq=[];

function rand(a,b){ return a+Math.random()*(b-a); }

function randomP(){
 return {
  Rp:rand(1e4,2e5),
  L:rand(1,3),
  C:rand(80e-12,150e-12),
  Rdc:rand(3e3,6e3),
  Re:rand(1e4,1e5),
  Le:rand(0.5,5)
 };
}

function error(p,data){
 let e=0,n=0;

 for(let f of freq){
  let m=model(p,f);

  if(data.hmag){
    let w=1;
    if(weightH.checked){
      let lf=Math.log10(f), c=Math.log10(7000);
      w=1+3*Math.exp(-((lf-c)**2)/(2*0.42*0.42));
    }
    e+=((m.Hm-interp(f,data.hmag))*w)**2; n++;
  }
  if(data.hph){ e+=((m.Hp-interp(f,data.hph))/5)**2; n++; }
  if(data.zmag){ e+=((Math.log(m.Zm)-Math.log(interp(f,data.zmag)))/0.08)**2; n++; }
  if(data.zph){ e+=((m.Zp-interp(f,data.zph))/3)**2; n++; }
 }

 return e/n;
}

// ---------- FIT RUN ----------
async function runFit(){

 let data={
  hmag:await loadFile(hmag),
  hph:await loadFile(hph),
  zmag:await loadFile(zmag),
  zph:await loadFile(zph)
 };

 freq=[];
 for(let i=0;i<300;i++){
  freq.push(10**(Math.log10(20)+i/299*(Math.log10(20000)-Math.log10(20))));
 }

 let best=null, bestE=1e99;

 for(let s=0;s<25;s++){
  let p=randomP();

  for(let i=0;i<60;i++){
   let p2=JSON.parse(JSON.stringify(p));
   let k=Object.keys(p2)[Math.floor(Math.random()*6)];
   p2[k]*=rand(0.85,1.15);

   let e=error(p2,data);
   if(e<bestE){ bestE=e; best=p2; p=p2; }
  }
 }

 bestParams=best;
 params.innerText=JSON.stringify(best,null,2);

 plotAll(best,data);
}

// ---------- LOAD SIM ----------
function calcLoad(){
 if(!bestParams){ alert(\"erst fitten!\"); return; }

 let R=+loadR.value;
 let L=+loadL.value;
 let C=+loadC.value*1e-12;

 let y=[];

 for(let f of freq){
  let w=2*Math.PI*f;

  let ZR=complex(R,0);
  let ZL=complex(0,w*L);
  let ZC=complex(0,-1/(w*C||1e9));

  let Y=add(inv(ZR),add(inv(ZL),inv(ZC)));
  let Zload=inv(Y);

  let m=model(bestParams,f);

  y.push(m.Hm - 20*Math.log10(abs(Zload))); // simple load effect
 }

 plot(p5,freq,y,null);
}

// ---------- PLOT ----------
function plot(c,x,y1,y2){
 let ctx=c.getContext(\"2d\");
 ctx.clearRect(0,0,c.width,c.height);

 let xmin=Math.min(...x), xmax=Math.max(...x);
 let ymin=Math.min(...y1.concat(y2||y1));
 let ymax=Math.max(...y1.concat(y2||y1));

 function tx(v){ return (Math.log10(v)-Math.log10(xmin))/(Math.log10(xmax)-Math.log10(xmin))*c.width; }
 function ty(v){ return c.height-(v-ymin)/(ymax-ymin)*c.height; }

 ctx.strokeStyle=\"red\";
 ctx.beginPath();
 x.forEach((v,i)=>{ let xx=tx(v),yy=ty(y1[i]); i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy); });
 ctx.stroke();

 if(y2){
 ctx.strokeStyle=\"cyan\";
 ctx.beginPath();
 x.forEach((v,i)=>{ let xx=tx(v),yy=ty(y2[i]); i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy); });
 ctx.stroke();
 }
}

// ---------- MASTER ----------
function plotAll(p,data){

 let Hm=[],Hp=[],Zm=[],Zp=[];

 freq.forEach(f=>{
  let m=model(p,f);
  Hm.push(m.Hm);
  Hp.push(m.Hp);
  Zm.push(m.Zm);
  Zp.push(m.Zp);
 });

 plot(p1,freq,Hm,data.hmag&&freq.map(f=>interp(f,data.hmag)));
 plot(p2,freq,Hp,data.hph&&freq.map(f=>interp(f,data.hph)));
 plot(p3,freq,Zm,data.zmag&&freq.map(f=>interp(f,data.zmag)));
 plot(p4,freq,Zp,data.zph&&freq.map(f=>interp(f,data.zph)));
}

</script>
</body>
</html>
